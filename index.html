<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waliya Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f021a; --gold: #FFD700; --glass: rgba(255,255,255,0.07); }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: rgba(30, 11, 61, 0.9); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .bal-amt { color: var(--gold); font-weight: 900; font-size: 22px; }
        
        .prize-bar { background: linear-gradient(90deg, #F57F17, var(--gold)); color: black; padding: 10px; text-align: center; font-weight: 900; font-size: 13px; }

        .grid { flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; padding-bottom: 100px; }
        .box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; transition: 0.2s; }
        .box.selected { background: rgba(255, 215, 0, 0.2); border-color: var(--gold); color: var(--gold); transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; background: linear-gradient(to top, var(--bg) 80%, transparent); }
        .btn { background: var(--gold); color: black; border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="header">
        <div><small>WALLET</small><br><span class="bal-amt">WALIYA BINGO</span></div>
        <div style="font-size: 30px;">🦅</div>
    </div>
    <div class="prize-bar">🔥 LIVE ROUND STARTS IN 1 MINUTE 🔥</div>
    <div class="grid" id="g"></div>
    <div class="footer"><button class="btn" id="b" onclick="p()">SELECT CARDS</button></div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = [];
        const g = document.getElementById('g');
        for(let i=1; i<=400; i++) {
            const d = document.createElement('div');
            d.className = 'box';
            d.innerText = i;
            d.onclick = () => {
                if(s.includes(i)) { s = s.filter(x => x !== i); d.classList.remove('selected'); }
                else if(s.length < 3) { s.push(i); d.classList.add('selected'); }
                document.getElementById('b').innerText = s.length ? `BUY ${s.length} TICKETS (${s.length*5} ETB)` : "SELECT CARDS";
            };
            g.appendChild(d);
        }
        function p() {
            if(!s.length) return;
            tg.sendData(JSON.stringify({action: "join_round", cards: s}));
            tg.close();
        }
        tg.expand();
    </script>
</body>
</html>
