<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waliya Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #120322; --card: #220a45; --gold: #fbc02d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: #1e0b3d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(251, 192, 45, 0.3); }
        .bal-val { color: var(--gold); font-weight: 900; font-size: 1.1rem; }
        
        .prize-bar { background: linear-gradient(90deg, #fbc02d, #f57f17); color: #120322; text-align: center; padding: 8px; font-weight: 800; font-size: 0.85rem; }
        
        .history { display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.4); overflow-x: auto; min-height: 40px; align-items: center; }
        .ball { min-width: 32px; height: 32px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; box-shadow: 0 0 8px var(--gold); }

        .grid { flex-grow: 1; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; margin-bottom: 80px; }
        .card-item { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 18px 0; text-align: center; font-weight: 800; transition: 0.2s; }
        .card-item.selected { border-color: var(--gold); background: rgba(251, 192, 45, 0.15); color: var(--gold); box-shadow: 0 0 15px rgba(251, 192, 45, 0.2); }

        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, var(--bg), transparent); box-sizing: border-box; }
        .buy-btn { background: var(--gold); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div><span style="opacity: 0.6; font-size: 0.7rem;">WALLET BALANCE</span><br><span class="bal-val" id="balText">0.00 ETB</span></div>
        <div style="font-size: 1.5rem;">🦅</div>
    </div>
    <div class="prize-bar">🏆 CURRENT PRIZE POOL: <span id="poolText">0.00</span> ETB</div>
    <div class="history" id="ballHistory"><span style="font-size: 0.7rem; opacity: 0.5;">WAITING FOR NEXT ROUND...</span></div>

    <div class="grid" id="mainGrid"></div>

    <div class="footer">
        <button class="buy-btn" id="mainBtn" onclick="confirmPurchase()">BUY TICKETS (0 ETB)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let selected = [];
        const PRICE = 5;

        // Populate 1-400
        const grid = document.getElementById('mainGrid');
        for(let i=1; i<=400; i++) {
            const el = document.createElement('div');
            el.className = 'card-item';
            el.innerText = i;
            el.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(x => x !== i);
                    el.classList.remove('selected');
                } else if(selected.length < 3) {
                    selected.push(i);
                    el.classList.add('selected');
                    tg.HapticFeedback.impactOccurred('medium');
                }
                document.getElementById('mainBtn').innerText = `BUY TICKETS (${selected.length * PRICE} ETB)`;
            };
            grid.appendChild(el);
        }

        function confirmPurchase() {
            if(selected.length === 0) return;
            tg.sendData(JSON.stringify({action: "join", cards: selected}));
            tg.close();
        }
    </script>
</body>
</html>
