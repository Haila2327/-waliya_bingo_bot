<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waliya Bingo Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #130326; --panel: #1e0b3d; --gold: #fbc02d; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* TOP NAV */
        .nav { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .bal-box { display: flex; flex-direction: column; }
        .bal-amt { color: var(--gold); font-weight: 900; font-size: 1.2rem; }
        
        /* PRIZE BANNER */
        .prize-bar { background: linear-gradient(90deg, #fbc02d, #f57f17); color: #130326; padding: 10px; text-align: center; font-weight: 900; font-size: 0.9rem; }
        
        /* HISTORY ROW */
        .history { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: rgba(0,0,0,0.3); min-height: 45px; align-items: center; }
        .ball { min-width: 35px; height: 35px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; box-shadow: 0 0 10px var(--gold); }

        /* GRID 1-400 */
        .container { padding: 15px; height: 60vh; overflow-y: auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px 0; text-align: center; font-weight: 800; transition: 0.2s; }
        .card.selected { border-color: var(--gold); background: rgba(251, 192, 45, 0.2); color: var(--gold); transform: scale(1.05); }

        /* PLAY BUTTON */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; background: linear-gradient(to top, var(--bg), transparent); }
        .btn { background: var(--gold); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="nav">
        <div class="bal-box">
            <span style="font-size: 0.7rem; opacity: 0.6;">WALLET BALANCE</span>
            <span class="bal-amt" id="balance">0.00 ETB</span>
        </div>
        <div style="font-size: 1.5rem;">🦅</div>
    </div>

    <div class="prize-bar">🏆 ESTIMATED PRIZE: <span id="pot">0.00</span> ETB</div>

    <div class="history" id="history">
        <div style="opacity: 0.5; font-size: 0.7rem;">WAITING FOR NEXT ROUND...</div>
    </div>

    <div class="container" id="grid"></div>

    <div class="footer">
        <button class="btn" id="playBtn" onclick="buyTickets()">BUY TICKETS (0 ETB)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let selected = [];
        const PRICE = 5;

        // Build 1-400
        const grid = document.getElementById('grid');
        for(let i=1; i<=400; i++){
            const d = document.createElement('div');
            d.className = 'card';
            d.innerText = i;
            d.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(x => x !== i);
                    d.classList.remove('selected');
                } else if(selected.length < 3) {
                    selected.push(i);
                    d.classList.add('selected');
                }
                document.getElementById('playBtn').innerText = `BUY TICKETS (${selected.length * PRICE} ETB)`;
            };
            grid.appendChild(d);
        }

        function buyTickets() {
            if(selected.length === 0) return;
            tg.sendData(JSON.stringify({action: "join", cards: selected}));
            tg.close();
        }
    </script>
</body>
</html>
