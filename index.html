<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waliya Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f021a;
            --bg-light: #2c0a4d;
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.08);
        }
        
        body {
            background: radial-gradient(circle at top, var(--bg-light), var(--bg-dark));
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* GLOSSY HEADER */
        .header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .bal-title { font-size: 10px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }
        .bal-amt { color: var(--gold); font-weight: 900; font-size: 20px; text-shadow: 0 0 10px var(--gold-glow); }
        .avatar { width: 40px; height: 40px; background: linear-gradient(45deg, var(--gold), #ff8c00); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 20px; }

        /* LIVE PRIZE TRACKER */
        .prize-banner {
            background: linear-gradient(90deg, #ff8c00, var(--gold), #ff8c00);
            background-size: 200% auto;
            color: #0f021a;
            padding: 10px;
            text-align: center;
            font-weight: 900;
            font-size: 14px;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* THE CARD GRID */
        .grid-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-bottom: 100px; /* Space for button */
        }
        
        .bingo-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .bingo-card:active { transform: scale(0.9); }
        
        .bingo-card.selected {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold);
            color: var(--gold);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold-glow), inset 0 0 10px var(--gold-glow);
        }

        /* PREMIUM PLAY BUTTON */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, #0f021a 70%, transparent);
            box-sizing: border-box;
        }
        
        .play-btn {
            background: linear-gradient(90deg, #FFD700, #F57F17);
            color: #0f021a;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
            transition: 0.3s;
        }
        .play-btn:disabled { background: #333; color: #666; box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="bal-title">Wallet Balance</div>
            <div class="bal-amt">0.00 ETB</div>
        </div>
        <div class="avatar">W</div>
    </div>

    <div class="prize-banner">
        🔥 NEXT POT: <span id="potAmount">150.00</span> ETB 🔥
    </div>

    <div class="grid-container" id="grid">
        </div>

    <div class="footer">
        <button class="play-btn" id="playBtn" disabled onclick="buyCards()">SELECT CARDS TO PLAY</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Forces full screen
        
        let selectedCards = [];
        const PRICE_PER_CARD = 5;

        // Build 1-400 Grid
        const grid = document.getElementById('grid');
        for(let i=1; i<=400; i++) {
            const card = document.createElement('div');
            card.className = 'bingo-card';
            card.innerText = i;
            
            card.onclick = () => {
                // Haptic feedback for native app feel
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

                if(selectedCards.includes(i)) {
                    selectedCards = selectedCards.filter(c => c !== i);
                    card.classList.remove('selected');
                } else {
                    if(selectedCards.length >= 3) {
                        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                        return; // Max 3 cards
                    }
                    selectedCards.push(i);
                    card.classList.add('selected');
                }
                updateButton();
            };
            grid.appendChild(card);
        }

        function updateButton() {
            const btn = document.getElementById('playBtn');
            if(selectedCards.length > 0) {
                btn.disabled = false;
                btn.innerText = `BUY TICKETS (${selectedCards.length * PRICE_PER_CARD} ETB)`;
            } else {
                btn.disabled = true;
                btn.innerText = "SELECT CARDS TO PLAY";
            }
        }

        function buyCards() {
            if(selectedCards.length === 0) return;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            // Send to Python Bot
            tg.sendData(JSON.stringify({action: "join_round", cards: selectedCards}));
            tg.close();
        }
    </script>
</body>
</html>
